name: juxt_music
description: "Open Source music player following juxt_music theme using Audius API."
publish_to: 'none'
version: 0.1.0+2

environment:
  sdk: ^3.11.4

dependencies:
  cached_network_image: ^3.4.1
  flutter:
    sdk: flutter
  font_awesome_flutter: ^11.0.0
  gradient_blur: ^1.0.2+1
  http: ^1.6.0
  image: ^4.8.0
  just_audio: ^0.10.5
  # ── Linux & Android audio backend (media_kit / libmpv) ─────────────────
  just_audio_media_kit: ^2.1.0        # media_kit bindings for just_audio
  media_kit_libs_linux: any            # bundled libmpv for Linux
  media_kit_libs_android_audio: any   # bundled audio libs for Android (future)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
  
  # COVER ARTS for MOOD
  - lib/assets/mood_covers/